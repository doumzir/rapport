<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}WorkTracer{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #242424;
      --border: #2e2e2e;
      --text: #e0e0e0;
      --muted: #888;
      --accent: #2563eb;
      --green: #16a34a;
      --yellow: #ca8a04;
      --red: #dc2626;
      --font: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    nav .brand { font-size: 14px; font-weight: bold; color: var(--text); }
    nav .brand span { color: var(--accent); }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
    }

    .card h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-green  { background: #14532d; color: #4ade80; }
    .badge-yellow { background: #713f12; color: #fbbf24; }
    .badge-red    { background: #7f1d1d; color: #f87171; }
    .badge-blue   { background: #1e3a5f; color: #60a5fa; }
    .badge-gray   { background: var(--bg3); color: var(--muted); }

    .source-git    { color: #f97316; }
    .source-manual { color: #60a5fa; }
    .source-note   { color: #a78bfa; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg3); }

    .btn {
      display: inline-block;
      padding: 6px 14px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-family: var(--font);
      font-size: 12px;
    }
    .btn:hover { background: #1d4ed8; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-ghost:hover { background: var(--bg3); }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .htmx-indicator { display: none; color: var(--muted); font-size: 11px; }
    .htmx-request .htmx-indicator { display: inline; }

    pre, .prose {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">Work<span>Tracer</span></a>
    <a href="/">Dashboard</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
